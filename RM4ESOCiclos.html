<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="./manifest.json" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <title>Plan Interactivo de Razonamiento Matemático - 4º ESO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #FDFBF8; color: #4A4A4A; }
        .filter-btn.active { transform: translateY(-2px); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1); }
        .week-card.filtered-out { opacity: 0.15; transform: scale(0.98); }
        .session-card.highlight { transform: scale(1.05); box-shadow: 0 0 0 2px #4F46E5; }
        .hidden-content { display: none; }
        .hidden { display: none !important; }
        .export-btn { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); transition: all 0.3s ease; }
        .export-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1); }
        .date-preview { font-size: 0.875rem; color: #6B7280; margin-top: 0.25rem; }
    </style>
</head>
<body class="antialiased">
    <div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8 md:py-12">
        <header class="text-center mb-10">
            <h1 class="text-3xl md:text-4xl font-bold text-gray-800">Plan de Razonamiento Matemático (4º de ESO)</h1>
            <p class="mt-2 text-lg text-gray-600">Itinerario de Ciclos Formativos (<span class="font-bold text-indigo-600">36 semanas</span>)</p>
        </header>

        <main>
            <section id="trimestre-config" class="mb-12 bg-white rounded-2xl shadow-sm overflow-hidden">
                <button class="w-full text-left p-6 flex justify-between items-center cursor-pointer focus:outline-none" onclick="toggleConfig()">
                    <h2 class="text-2xl font-bold text-gray-800">Configurar Trimestres</h2>
                    <span id="toggle-config-icon" class="text-2xl font-bold transform transition-transform duration-300">+</span>
                </button>
                
                <div id="config-content" class="p-5 border-t border-gray-200 space-y-6 hidden-content">
                    <div class="grid md:grid-cols-3 gap-6">
                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-700 mb-4">Primer Trimestre</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de inicio</label>
                                    <input type="date" id="trim1-start" value="2025-09-15" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="updateDatesInRealTime()">
                                    <div class="date-preview" id="trim1-dates"></div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Semanas</label>
                                    <input type="number" id="trim1-weeks" min="1" max="34" value="14" class="w-full px-4 py-2 border border-gray-300 rounded-lg" oninput="updateWeeksSummary()">
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-700 mb-4">Segundo Trimestre</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de inicio</label>
                                    <input type="date" id="trim2-start" value="2026-01-12" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="updateDatesInRealTime()">
                                    <div class="date-preview" id="trim2-dates"></div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Semanas</label>
                                    <input type="number" id="trim2-weeks" min="1" max="34" value="11" class="w-full px-4 py-2 border border-gray-300 rounded-lg" oninput="updateWeeksSummary()">
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-700 mb-4">Tercer Trimestre</h3>
                            <div class="space-y-4">
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de inicio</label>
                                    <input type="date" id="trim3-start" value="2026-04-06" class="w-full px-4 py-2 border border-gray-300 rounded-lg" onchange="updateDatesInRealTime()">
                                    <div class="date-preview" id="trim3-dates"></div>
                                </div>
                                <div>
                                    <label class="block text-sm font-medium text-gray-700 mb-1">Semanas</label>
                                    <input type="number" id="trim3-weeks" min="1" max="34" value="11" class="w-full px-4 py-2 border border-gray-300 rounded-lg" oninput="updateWeeksSummary()">
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row gap-4 justify-between items-center p-4 bg-blue-50 border border-blue-200 rounded-lg">
                        <div class="text-sm text-blue-800">
                            <p><strong>Total:</strong> <span id="total-weeks" class="font-bold">36</span>/36 semanas</p>
                            <p id="weeks-warning" class="text-orange-600 hidden">¡La suma debe ser 36!</p>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="applyConfiguration()" class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition">Aplicar</button>
                            <button onclick="exportToHTML()" class="export-btn px-6 py-2 text-white font-semibold rounded-lg transition">Exportar HTML</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="controls" class="mb-12 p-6 bg-white rounded-2xl shadow-sm">
                <div class="mb-6">
                    <h3 class="text-lg font-semibold text-gray-700 mb-3">Asignaturas</h3>
                    <div id="subject-filters" class="flex flex-wrap gap-2"></div>
                </div>
                <div>
                    <h3 class="text-lg font-semibold text-gray-700 mb-3">Ámbitos</h3>
                    <div id="ambito-filters" class="flex flex-wrap gap-2"></div>
                </div>
                <div class="mt-6 text-center">
                    <button id="reset-filters" class="px-6 py-2 bg-gray-200 text-gray-700 font-semibold rounded-lg hover:bg-gray-300 transition">Mostrar Todo</button>
                </div>
            </section>

            <section id="reports" class="mb-12 bg-white rounded-2xl shadow-sm overflow-hidden">
                <button class="w-full text-left p-6 flex justify-between items-center cursor-pointer focus:outline-none" onclick="toggleReports()">
                    <h2 class="text-2xl font-bold text-gray-800">Informes PDF</h2>
                    <span id="toggle-reports-icon" class="text-2xl font-bold transform transition-transform duration-300">+</span>
                </button>
                <div id="reports-content" class="p-5 border-t border-gray-200 space-y-6 hidden-content">
                    <div class="grid md:grid-cols-2 gap-8">
                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-700 mb-4">Por Materia</h3>
                            <select id="subject-select" class="w-full px-4 py-2 border border-gray-300 rounded-lg mb-4">
                                <option value="">-- Materia --</option>
                            </select>
                            <div class="flex flex-wrap gap-3 mb-4">
                                <label class="flex items-center"><input type="checkbox" id="eval1-report" checked class="mr-2"> 1ª</label>
                                <label class="flex items-center"><input type="checkbox" id="eval2-report" checked class="mr-2"> 2ª</label>
                                <label class="flex items-center"><input type="checkbox" id="eval3-report" checked class="mr-2"> 3ª</label>
                            </div>
                            <button id="generate-subject-pdf" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold">Generar PDF Materia</button>
                        </div>
                        <div class="bg-gray-50 p-6 rounded-xl border border-gray-200">
                            <h3 class="text-lg font-semibold text-gray-700 mb-4">Por Trimestre</h3>
                            <div class="space-y-2 mb-4">
                                <label class="flex items-center"><input type="checkbox" id="trimestre1" checked class="mr-2"> 1º Trimestre</label>
                                <label class="flex items-center"><input type="checkbox" id="trimestre2" checked class="mr-2"> 2º Trimestre</label>
                                <label class="flex items-center"><input type="checkbox" id="trimestre3" checked class="mr-2"> 3º Trimestre</label>
                            </div>
                            <button id="generate-trimestre-pdf" class="w-full py-3 bg-indigo-600 text-white rounded-lg font-bold">Generar PDF Trimestres</button>
                        </div>
                    </div>
                </div>
            </section>

            <section id="summary" class="mb-12 bg-white rounded-2xl shadow-sm p-6">
                <h2 class="text-xl font-bold text-gray-800 text-center mb-4">Distribución de Sesiones</h2>
                <div class="chart-container relative w-full max-w-lg mx-auto h-80">
                    <canvas id="proportionalityChart"></canvas>
                </div>
            </section>

            <section id="schedule">
                <div id="evaluations-container" class="space-y-6">
                    </div>
            </section>
        </main>
    </div>

    <script>
        // DATOS DE MATERIAS (4º ESO Ciclos)
        const subjects = {
            'Lengua': { hours: 4, ambito: 'SL' },
            'Geografía e Historia': { hours: 3, ambito: 'SL' },
            'Inglés': { hours: 4, ambito: 'SL' },
            'Religión': { hours: 1, ambito: 'SL' },
            'Matemáticas': { hours: 4, ambito: 'CT' },
            'Tecnología': { hours: 3, ambito: 'CT' },
            'Cultura Científica': { hours: 2, ambito: 'CT' },
            'Expresión Artística': { hours: 3, ambito: 'AR' },
            'Música': { hours: 3, ambito: 'AR' },
            'Dibujo Técnico': { hours: 2, ambito: 'AR' },
            'Educación Física': { hours: 2, ambito: 'AR' }
        };

        const sessionLinks = {
            1: { 1: "https://docs.google.com/spreadsheets/d/1QEYC3Hy4nR0dzS8Uil6-c7JkNtDdsvclR-lf_vBhkqA/edit?gid=1031906857#gid=1031906857&range=B5", 2: "...range=E5", 3: "...range=H5" },
            // ... (el resto de enlaces originales se asumen cargados en el objeto real)
        };

        const ambitoColors = { 'SL': 'bg-red-100 text-red-800', 'CT': 'bg-blue-100 text-blue-800', 'AR': 'bg-green-100 text-green-800' };
        let scheduleData = [];
        let chartInstance = null;

        // FUNCIONES DE UI
        function toggleConfig() { document.getElementById('config-content').classList.toggle('hidden-content'); }
        function toggleReports() { document.getElementById('reports-content').classList.toggle('hidden-content'); }
        function toggleEvaluation(id) { document.getElementById(`evaluation-content-${id}`).classList.toggle('hidden-content'); }

        // LÓGICA DE REPARTO UNIFORME
        function generateSchedule() {
            const t1W = parseInt(document.getElementById('trim1-weeks').value);
            const t2W = parseInt(document.getElementById('trim2-weeks').value);
            const t3W = parseInt(document.getElementById('trim3-weeks').value);
            const totalHours = Object.values(subjects).reduce((acc, s) => acc + s.hours, 0);

            // Generar pool de materias proporcional a las horas y repartido por trimestres
            function getPool(numWeeks) {
                let slots = numWeeks * 2;
                let pool = [];
                let counts = {};
                let current = 0;

                for (let name in subjects) {
                    let c = Math.floor((subjects[name].hours / totalHours) * slots);
                    counts[name] = c;
                    current += c;
                }
                // Ajustar redondeo para llenar los slots exactos
                let sorted = Object.keys(subjects).sort((a,b) => ((subjects[b].hours/totalHours)*slots % 1) - ((subjects[a].hours/totalHours)*slots % 1));
                while(current < slots) { counts[sorted[current % sorted.length]]++; current++; }

                for(let name in counts) for(let i=0; i<counts[name]; i++) pool.push(name);
                return pool.sort(() => Math.random() - 0.5);
            }

            const pools = [getPool(t1W), getPool(t2W), getPool(t3W)];
            scheduleData = [];
            let weekCounter = 1;

            [t1W, t2W, t3W].forEach((numWeeks, trimIdx) => {
                let pool = pools[trimIdx];
                for (let i = 0; i < numWeeks; i++) {
                    let s2 = pool[i*2];
                    let s3 = pool[i*2 + 1];
                    scheduleData.push({
                        week: weekCounter++,
                        trimestre: trimIdx + 1,
                        sessions: [
                            { title: "R. Lógico", subject: "Matemáticas", ambito: "CT", link: sessionLinks[weekCounter-1]?.[1] || "#" },
                            { title: `S2: ${s2}`, subject: s2, ambito: subjects[s2].ambito, link: sessionLinks[weekCounter-1]?.[2] || "#" },
                            { title: `S3: ${s3}`, subject: s3, ambito: subjects[s3].ambito, link: sessionLinks[weekCounter-1]?.[3] || "#" }
                        ]
                    });
                }
            });
        }

        // RENDERIZADO
        function renderEverything() {
            const container = document.getElementById('evaluations-container');
            container.innerHTML = '';
            
            const t1W = parseInt(document.getElementById('trim1-weeks').value);
            const t2W = parseInt(document.getElementById('trim2-weeks').value);
            
            const trimesters = [
                { id: 1, name: "Primera Evaluación", start: 1, end: t1W },
                { id: 2, name: "Segunda Evaluación", start: t1W + 1, end: t1W + t2W },
                { id: 3, name: "Tercera Evaluación", start: t1W + t2W + 1, end: 36 }
            ];

            trimesters.forEach(trim => {
                const section = document.createElement('div');
                section.className = "bg-white rounded-2xl shadow-sm overflow-hidden mb-6";
                section.innerHTML = `
                    <button class="w-full text-left p-6 flex justify-between items-center" onclick="toggleEvaluation(${trim.id})">
                        <h3 class="text-xl font-bold">${trim.name} (Semanas ${trim.start}-${trim.end})</h3>
                        <span id="toggle-icon-${trim.id}">+</span>
                    </button>
                    <div id="evaluation-content-${trim.id}" class="p-5 border-t hidden-content grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>
                `;
                container.appendChild(section);
                
                const content = document.getElementById(`evaluation-content-${trim.id}`);
                scheduleData.filter(d => d.week >= trim.start && d.week <= trim.end).forEach(week => {
                    const card = document.createElement('div');
                    card.className = "week-card p-4 border rounded-xl bg-gray-50";
                    card.innerHTML = `<h4 class="font-bold mb-2">Semana ${week.week}</h4><div class="space-y-2">` + 
                        week.sessions.map(s => `
                            <a href="${s.link}" target="_blank" class="session-card block p-2 rounded text-xs ${ambitoColors[s.ambito]} hover:opacity-80">
                                <strong>${s.title}</strong>
                            </a>
                        `).join('') + `</div>`;
                    content.appendChild(card);
                });
            });

            renderChart();
            populateSelects();
        }

        function populateSelects() {
            const sel = document.getElementById('subject-select');
            sel.innerHTML = '<option value="">-- Materia --</option>';
            Object.keys(subjects).sort().forEach(s => {
                sel.innerHTML += `<option value="${s}">${s}</option>`;
            });
        }

        function renderChart() {
            const ctx = document.getElementById('proportionalityChart').getContext('2d');
            const data = {};
            scheduleData.forEach(w => w.sessions.slice(1).forEach(s => data[s.subject] = (data[s.subject] || 0) + 1));
            
            if(chartInstance) chartInstance.destroy();
            chartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data),
                    datasets: [{ data: Object.values(data), backgroundColor: ['#4F46E5', '#10B981', '#F59E0B', '#EF4444', '#8B5CF6', '#EC4899', '#06B6D4', '#F97316', '#6366F1', '#14B8A6', '#D946EF'] }]
                },
                options: { maintainAspectRatio: false, plugins: { legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 10 } } } } }
            });
        }

        function updateDatesInRealTime() {
            const t1 = new Date(document.getElementById('trim1-start').value);
            const t2 = new Date(document.getElementById('trim2-start').value);
            const t3 = new Date(document.getElementById('trim3-start').value);
            const fmt = d => d.toLocaleDateString('es-ES', { day: '2-digit', month: '2-digit' });

            document.getElementById('trim1-dates').innerText = `${fmt(t1)} - Finales de Dic`;
            document.getElementById('trim2-dates').innerText = `${fmt(t2)} - Marzo`;
            document.getElementById('trim3-dates').innerText = `${fmt(t3)} - Junio`;
        }

        function updateWeeksSummary() {
            const sum = parseInt(document.getElementById('trim1-weeks').value) + parseInt(document.getElementById('trim2-weeks').value) + parseInt(document.getElementById('trim3-weeks').value);
            document.getElementById('total-weeks').innerText = sum;
            document.getElementById('weeks-warning').classList.toggle('hidden', sum === 36);
        }

        function applyConfiguration() {
            generateSchedule();
            renderEverything();
            toggleConfig();
        }

        function exportToHTML() {
            const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Plan_Razonamiento_4ESO_Custom.html';
            a.click();
        }

        // INICIALIZACIÓN
        document.addEventListener('DOMContentLoaded', () => {
            updateDatesInRealTime();
            generateSchedule();
            renderEverything();
            
            document.getElementById('reset-filters').addEventListener('click', () => {
                document.querySelectorAll('.week-card').forEach(c => c.classList.remove('filtered-out'));
            });
        });
    </script>
</body>
</html>
